name: Deploy to FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render config.php from template
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          AN_API_TOKEN: ${{ secrets.AN_API_TOKEN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DARY_USERNAME: ${{ secrets.DARY_USERNAME }}
          DARY_PASSWORD: ${{ secrets.DARY_PASSWORD }}
        run: |
          php -r '
            $tpl = file_get_contents("config.template.php");
            $out = strtr($tpl, [
              "__STRIPE_SECRET_KEY__"     => getenv("STRIPE_SECRET_KEY") ?: "",
              "__STRIPE_WEBHOOK_SECRET__" => getenv("STRIPE_WEBHOOK_SECRET") ?: "",
              "__AN_API_TOKEN__"          => getenv("AN_API_TOKEN") ?: "",
              "__ADMIN_PASSWORD__"        => getenv("ADMIN_PASSWORD") ?: "",
              "__DARY_USERNAME__"         => getenv("DARY_USERNAME") ?: "",
              "__DARY_PASSWORD__"         => getenv("DARY_PASSWORD") ?: "",
            ]);
            file_put_contents("config.php", $out);
          '

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: lepsibrno.cz/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.DS_Store
            **/node_modules/**
            zadani.md
            README.md
            config.template.php
            config.local.php
            matching-status.json
            .env
            .env.*
