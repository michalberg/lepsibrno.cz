name: FTP upload (lftp fallback)

# Záložní nahrání PHP app souborů přes lftp — použij, když hlavní "Deploy to FTP"
# (SamKirkland) padá na "Timeout (control socket)". config.php se NEnahrává
# (drží se ručně na serveru). Spouští se ručně (workflow_dispatch).

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Upload app files via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          REMOTE="lepsibrno.cz/public_html"
          OPTS="set ssl:verify-certificate no; set ssl:check-hostname no; set ftp:ssl-allow true; set ftp:ssl-protect-data true; set ftp:use-pasv-address no; set net:timeout 15; set net:max-retries 2;"
          CMDS="$OPTS"
          for f in transakce.php sync-onetime.php db.php create-checkout.php stripe-webhook.php log-donor.php index.html dekujeme.html; do
            CMDS="$CMDS put -O $REMOTE $f;"
          done
          CMDS="$CMDS bye"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "$CMDS"
          echo "✓ nahráno"
